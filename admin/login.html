<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Login — ZAZ Collection</title>
<link rel="stylesheet" href="/admin/admin.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 1px solid var(--border);
    padding: 40px 34px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 26px;
  }
  .card h1 {
    font-family: PlayfairDisplay-Bold, serif;
    font-size: 19px;
    margin: 0;
    color: var(--text);
  }
  .subtitle {
    font-family: Poppins-Regular, sans-serif;
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 26px;
  }
  label {
    display: block;
    font-family: Poppins-SemiBold, sans-serif;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 7px;
    color: var(--muted);
  }
  input {
    width: 100%;
    padding: 12px 13px;
    border-radius: 0;
    border: 1px solid var(--border-dark);
    font-family: Poppins-Regular, sans-serif;
    font-size: 14px;
    margin-bottom: 18px;
    background: #fafafa;
    color: var(--text);
  }
  input:focus {
    outline: none;
    border-color: var(--brand);
    background: #fff;
  }
  .card button {
    width: 100%;
    padding: 13px;
  }
  .error {
    background: var(--danger-bg);
    color: var(--danger);
    border-left: 3px solid var(--danger);
    padding: 11px 13px;
    font-family: Poppins-Regular, sans-serif;
    font-size: 13px;
    margin-bottom: 18px;
    display: none;
  }

  /* Phones */
  @media (max-width: 420px) {
    body { padding: 16px; align-items: flex-start; padding-top: 12vh; }
    .card { padding: 30px 22px; }
    .logo-badge { width: 34px; height: 34px; font-size: 11px; }
    .card h1 { font-size: 17px; }
  }

  /* iOS Safari zooms in on focus if an input's font-size is under 16px */
  @media (max-width: 600px) {
    input { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-badge">ZAZ</div>
      <div>
        <h1>ZAZ Collection Admin</h1>
      </div>
    </div>
    <p class="subtitle">Sign in to manage products, prices, and stock.</p>

    <div class="error" id="error-box"></div>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" id="submit-btn" class="btn btn-primary">Sign In</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    // If already logged in, skip straight to the dashboard.
    fetch('/api/session').then(r => r.json()).then(data => {
      if (data.authenticated) window.location.href = '/admin/index.html';
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/admin/index.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
