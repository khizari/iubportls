<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Product Admin — ZAZ Collection</title>
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div id="auth-gate" class="auth-gate">Checking session…</div>

  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-badge">ZAZ</div>
        <div>
          <h1>Product Manager</h1>
          <p class="signed-in-as">Signed in as <span id="username-label"></span></p>
        </div>
      </div>
      <div class="topbar-right">
        <span id="save-status" class="save-status"></span>
        <button id="save-btn" class="btn btn-primary">Save Changes</button>
        <button id="logout-btn" class="btn btn-ghost">Log Out</button>
      </div>
    </header>

    <div id="banner" class="banner hidden"></div>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-left">
          <button id="add-product-btn" class="btn btn-secondary">+ Add Product</button>
          <select id="category-filter" class="category-filter-select">
            <option value="">All categories</option>
            <option value="women">Women</option>
            <option value="men">Men</option>
            <option value="bag">Bag</option>
            <option value="shoes">Shoes</option>
            <option value="watches">Watches</option>
          </select>
        </div>
        <p class="hint">Edit any field below, then click <strong>Save Changes</strong> to publish it to the live site.</p>
      </div>

      <div id="products-container" class="products-grid"></div>
    </main>
  </div>

  <!-- Template for a single product card -->
  <template id="product-template">
    <div class="product-card">
      <div class="product-photo">
        <img class="product-photo-img" alt="">
        <label class="photo-upload-label">
          Change Photo
          <input type="file" accept="image/*" class="photo-input">
        </label>
      </div>
      <div class="product-fields">
        <label class="field-label">Name</label>
        <input type="text" class="p-name-input" placeholder="Product name">

        <label class="field-label">Category</label>
        <select class="p-category-input">
          <option value="women">Women</option>
          <option value="men">Men</option>
          <option value="bag">Bag</option>
          <option value="shoes">Shoes</option>
          <option value="watches">Watches</option>
        </select>

        <div class="field-row">
          <div>
            <label class="field-label">Price</label>
            <label class="price-label">$ <input type="number" class="p-price-input" min="0" step="0.01"></label>
          </div>
          <div>
            <label class="field-label">Stock</label>
            <input type="number" class="p-stock-input" min="0" step="1">
          </div>
        </div>

        <label class="checkbox-label discount-toggle-label">
          <input type="checkbox" class="p-discount-input"> 🏷️ Apply a discount (show old price crossed out)
        </label>
        <div class="field-row discount-row hidden">
          <label class="price-label discount-price-label">Old Price $ <input type="number" class="p-oldprice-input" min="0" step="0.01"></label>
        </div>
      </div>
      <button class="btn btn-danger btn-sm delete-product-btn">Delete</button>
    </div>
  </template>

  <script src="/admin/admin.js"></script>
</body>
</html>
